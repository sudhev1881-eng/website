name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_ENV: test
  # Satisfy backend getEnv() for unit tests that touch SITE_URL / AI / Telegram helpers
  DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
  SUPABASE_URL: https://example.supabase.co
  SUPABASE_ANON_KEY: anon-key-for-ci
  SUPABASE_SERVICE_ROLE_KEY: service-role-key-for-ci
  JWT_SECRET: "ci-jwt-secret-at-least-32-characters-long"
  CORS_ORIGIN: http://localhost:3000
  SITE_URL: http://localhost:3000
  OLLAMA_BASE_URL: http://127.0.0.1:11434
  RESUME_AI_PROVIDER: heuristic
  TELEGRAM_ENABLED: "false"

jobs:
  backend:
    name: Backend build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install workspaces
        working-directory: .
        run: npm ci
      - name: Typecheck
        run: npm run lint
      - name: Unit tests
        # node --import tsx is more reliable than the tsx bin shim in workspaces CI
        run: node --import tsx --test $(find src -name '*.test.ts' | sort | tr '\n' ' ')

  frontend:
    name: Frontend lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install workspaces
        working-directory: .
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://example.com/api
          NEXT_PUBLIC_SITE_URL: https://example.com
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: public-anon-key-for-ci
