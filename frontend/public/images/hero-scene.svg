    <rect x="1240" y="440" width="70" height="240"/><rect x="1330" y="480" width="80" height="200"/><rect x="1430" y="450" width="55" height="230"/>
    <rect x="1500" y="470" width="90" height="210"/><rect x="1610" y="430" width="65" height="250"/><rect x="1700" y="490" width="75" height="190"/>
