services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: studentlink
      POSTGRES_PASSWORD: studentlink
      POSTGRES_DB: studentlink
    ports:
      - "5432:5432"
    volumes:
      - studentlink_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studentlink"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./server
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://studentlink:studentlink@postgres:5432/studentlink
      JWT_SECRET: change-me-in-production
      SITE_URL: http://localhost:3000
      CORS_ORIGIN: http://localhost:3000
      NFC_READER_ENABLED: "false"
      STORAGE_PATH: /var/studentlink/uploads
    volumes:
      - studentlink_uploads:/var/studentlink/uploads
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000/api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    depends_on:
      - api

volumes:
  studentlink_pgdata:
  studentlink_uploads:
